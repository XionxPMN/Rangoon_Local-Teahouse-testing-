<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RK Admin · The Rangoon Kitchen</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ═══════════════════════════════════════════
   RANGOON KITCHEN ADMIN — Design System
═══════════════════════════════════════════ */
:root {
  --ink:          #0e0b09;
  --ink-2:        #161009;
  --surface:      #1a1209;
  --surface-2:    #201608;
  --surface-3:    #261c0a;
  --edge:         rgba(210,155,60,0.10);
  --edge-strong:  rgba(210,155,60,0.22);
  --edge-hover:   rgba(210,155,60,0.40);
  --gold:         #c9882a;
  --gold-hi:      #e4ab52;
  --gold-pale:    #f0d090;
  --gold-glow:    rgba(201,136,42,0.15);
  --red:          #c0392b;
  --red-bg:       rgba(192,57,43,0.12);
  --red-border:   rgba(192,57,43,0.30);
  --green:        #27ae60;
  --green-bg:     rgba(39,174,96,0.12);
  --green-border: rgba(39,174,96,0.30);
  --blue:         #2980b9;
  --blue-bg:      rgba(41,128,185,0.12);
  --text-primary: #f5f0e8;
  --text-muted:   rgba(245,240,232,0.55);
  --text-faint:   rgba(245,240,232,0.30);
  --font-serif:   'Playfair Display', Georgia, serif;
  --font-sans:    'Inter', system-ui, sans-serif;
  --r-sm: 6px; --r-md: 10px; --r-lg: 16px; --r-xl: 22px;
  --sidebar-w: 240px;
  --topbar-h:  60px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--text-primary);font-family:var(--font-sans);font-size:14px;line-height:1.6;min-height:100dvh;overflow-x:hidden}
img{display:block;width:100%;object-fit:cover}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ═══════════ LOGIN SCREEN ═══════════ */
#login-screen {
  position:fixed;inset:0;z-index:9999;
  background:var(--ink);
  display:flex;align-items:center;justify-content:center;
}
.login-card {
  background:var(--surface);
  border:1px solid var(--edge-strong);
  border-radius:var(--r-xl);
  padding:48px 40px;
  width:100%;max-width:400px;
  box-shadow:0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(210,155,60,0.06);
  text-align:center;
}
.login-logo-ring {
  width:72px;height:72px;border-radius:50%;
  border:2px solid var(--gold);
  background:var(--surface-2);
  margin:0 auto 20px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
}
.login-title {
  font-family:var(--font-serif);font-size:22px;font-weight:700;
  color:var(--text-primary);margin-bottom:4px;
}
.login-sub {font-size:12px;color:var(--text-muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:32px;}
.login-field{margin-bottom:16px;text-align:left;}
.login-field label{display:block;font-size:11px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:8px;}
.login-field input{
  width:100%;background:var(--ink-2);border:1px solid var(--edge-strong);border-radius:var(--r-sm);
  padding:12px 14px;color:var(--text-primary);font-size:14px;outline:none;
  transition:border-color 0.2s;
}
.login-field input:focus{border-color:var(--gold);}
.login-btn {
  width:100%;margin-top:8px;padding:13px;
  background:var(--gold);color:#0e0b09;border:none;border-radius:var(--r-sm);
  font-size:14px;font-weight:700;letter-spacing:0.03em;
  transition:background 0.15s,transform 0.1s;
}
.login-btn:hover{background:var(--gold-hi);}
.login-btn:active{transform:scale(0.98);}
.login-error{
  margin-top:14px;padding:10px 14px;border-radius:var(--r-sm);
  background:var(--red-bg);border:1px solid var(--red-border);
  color:#f08080;font-size:13px;display:none;
}
.login-error.show{display:block;}
.login-hint{margin-top:20px;font-size:11px;color:var(--text-faint);}

/* ═══════════ MAIN LAYOUT ═══════════ */
#app{display:none;min-height:100dvh;}
#app.visible{display:flex;}

/* SIDEBAR */
.sidebar {
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--surface);
  border-right:1px solid var(--edge);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  transition:transform 0.3s ease;
}
.sidebar-brand {
  padding:20px 20px 16px;
  border-bottom:1px solid var(--edge);
  display:flex;align-items:center;gap:10px;
}
.sidebar-brand-icon {
  width:34px;height:34px;border-radius:50%;border:1px solid var(--gold);
  background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:14px;
}
.sidebar-brand-text{line-height:1.25;}
.sidebar-brand-name{font-family:var(--font-serif);font-size:14px;color:var(--gold-pale);font-weight:600;}
.sidebar-brand-role{font-size:10px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;}

.sidebar-nav{flex:1;padding:16px 0;overflow-y:auto;}
.nav-section-label{
  padding:8px 20px 4px;
  font-size:9.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
  color:var(--text-faint);
}
.nav-item {
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;
  color:var(--text-muted);font-size:13.5px;font-weight:500;
  cursor:pointer;transition:all 0.15s;
  border-left:2px solid transparent;
  user-select:none;
}
.nav-item svg{width:16px;height:16px;fill:currentColor;flex-shrink:0;opacity:0.7;}
.nav-item:hover{color:var(--text-primary);background:rgba(201,136,42,0.05);}
.nav-item.active{
  color:var(--gold-pale);background:var(--gold-glow);
  border-left-color:var(--gold);font-weight:600;
}
.nav-item.active svg{opacity:1;}

.sidebar-footer{
  padding:16px 20px;border-top:1px solid var(--edge);
  display:flex;align-items:center;justify-content:space-between;
}
.sidebar-footer-name{font-size:12px;color:var(--text-muted);}
.logout-btn{
  padding:6px 12px;border-radius:var(--r-sm);
  background:var(--red-bg);border:1px solid var(--red-border);
  color:#f08080;font-size:11px;font-weight:600;
  transition:all 0.15s;
}
.logout-btn:hover{background:rgba(192,57,43,0.22);}

/* TOP BAR */
.main-area{
  margin-left:var(--sidebar-w);flex:1;
  display:flex;flex-direction:column;min-height:100dvh;
}
.topbar{
  height:var(--topbar-h);flex-shrink:0;
  background:rgba(14,11,9,0.9);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--edge);
  display:flex;align-items:center;padding:0 28px;gap:16px;
  position:sticky;top:0;z-index:50;
}
.topbar-title{font-family:var(--font-serif);font-size:17px;font-weight:600;color:var(--text-primary);flex:1;}
.topbar-badge{
  padding:4px 12px;border-radius:100px;
  background:var(--green-bg);border:1px solid var(--green-border);
  color:#7ec882;font-size:11px;font-weight:600;letter-spacing:0.04em;
  display:flex;align-items:center;gap:5px;
}
.topbar-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#27ae60;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:0.4}}

/* PAGE CONTENT */
.page-content{padding:28px;flex:1;}
.page-header{margin-bottom:28px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.page-title{font-family:var(--font-serif);font-size:24px;font-weight:700;color:var(--text-primary);}
.page-desc{font-size:13px;color:var(--text-muted);margin-top:3px;}

/* ═══════════ STAT CARDS ═══════════ */
.stats-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px;}
.stat-card{
  background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-md);
  padding:20px 22px;position:relative;overflow:hidden;
}
.stat-card::before{
  content:'';position:absolute;top:0;right:0;width:60px;height:60px;
  border-radius:0 0 0 60px;opacity:0.07;
}
.stat-card.gold::before{background:var(--gold);}
.stat-card.green::before{background:var(--green);}
.stat-card.blue::before{background:var(--blue);}
.stat-card.red::before{background:var(--red);}
.stat-icon{font-size:20px;margin-bottom:12px;}
.stat-val{font-family:var(--font-serif);font-size:28px;font-weight:700;color:var(--gold);line-height:1;}
.stat-card.green .stat-val{color:#7ec882;}
.stat-card.blue .stat-val{color:#5da9d6;}
.stat-card.red .stat-val{color:#f08080;}
.stat-label{font-size:11.5px;color:var(--text-muted);margin-top:4px;}

/* ═══════════ PANELS ═══════════ */
.panel{background:var(--surface);border:1px solid var(--edge);border-radius:var(--r-lg);overflow:hidden;margin-bottom:24px;}
.panel-head{
  padding:18px 22px;border-bottom:1px solid var(--edge);
  display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.panel-title{font-size:15px;font-weight:600;color:var(--text-primary);}
.panel-sub{font-size:12px;color:var(--text-muted);margin-top:1px;}
.panel-body{padding:22px;}

/* ═══════════ BUTTONS ═══════════ */
.btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:9px 18px;border-radius:var(--r-sm);
  font-size:13px;font-weight:600;border:none;
  transition:all 0.15s;white-space:nowrap;
}
.btn svg{width:14px;height:14px;fill:currentColor;}
.btn-gold{background:var(--gold);color:#0e0b09;}
.btn-gold:hover{background:var(--gold-hi);}
.btn-outline{background:transparent;color:var(--text-muted);border:1px solid var(--edge-strong);}
.btn-outline:hover{border-color:var(--gold);color:var(--text-primary);}
.btn-danger{background:var(--red-bg);color:#f08080;border:1px solid var(--red-border);}
.btn-danger:hover{background:rgba(192,57,43,0.22);}
.btn-success{background:var(--green-bg);color:#7ec882;border:1px solid var(--green-border);}
.btn-success:hover{background:rgba(39,174,96,0.22);}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-icon{padding:7px;border-radius:var(--r-sm);}

/* ═══════════ TABLES ═══════════ */
.data-table{width:100%;border-collapse:collapse;}
.data-table th{
  padding:10px 14px;text-align:left;
  font-size:10.5px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--text-faint);border-bottom:1px solid var(--edge);
}
.data-table td{
  padding:14px 14px;border-bottom:1px solid rgba(210,155,60,0.06);
  font-size:13.5px;vertical-align:middle;
}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:rgba(201,136,42,0.03);}
.table-img{width:48px;height:40px;object-fit:cover;border-radius:var(--r-sm);border:1px solid var(--edge);}
.item-name{font-weight:600;color:var(--text-primary);}
.item-name-my{font-size:11.5px;color:var(--gold);margin-top:1px;}
.price-badge{
  font-family:var(--font-serif);font-size:14px;font-weight:700;color:var(--gold-hi);
}
.table-actions{display:flex;gap:6px;align-items:center;}

/* ═══════════ BADGES / PILLS ═══════════ */
.pill{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:100px;
  font-size:10.5px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;
}
.pill-gold{background:rgba(201,136,42,0.15);color:var(--gold-hi);border:1px solid rgba(201,136,42,0.25);}
.pill-green{background:var(--green-bg);color:#7ec882;border:1px solid var(--green-border);}
.pill-blue{background:var(--blue-bg);color:#5da9d6;border:1px solid rgba(41,128,185,0.3);}
.pill-red{background:var(--red-bg);color:#f08080;border:1px solid var(--red-border);}
.pill-muted{background:rgba(245,240,232,0.06);color:var(--text-muted);border:1px solid var(--edge-strong);}

/* ═══════════ MODAL ═══════════ */
.modal-overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:20px;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{
  background:var(--surface);border:1px solid var(--edge-strong);
  border-radius:var(--r-xl);width:100%;max-width:580px;
  max-height:90vh;overflow-y:auto;
  transform:translateY(16px) scale(0.98);
  transition:transform 0.25s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 40px 100px rgba(0,0,0,0.7);
}
.modal-overlay.open .modal{transform:none;}
.modal-head{
  padding:22px 24px 18px;border-bottom:1px solid var(--edge);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:5;
}
.modal-title{font-family:var(--font-serif);font-size:18px;font-weight:700;color:var(--text-primary);}
.modal-close{
  width:32px;height:32px;border-radius:var(--r-sm);
  background:rgba(245,240,232,0.06);border:1px solid var(--edge);
  color:var(--text-muted);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.15s;
}
.modal-close:hover{background:var(--red-bg);color:#f08080;border-color:var(--red-border);}
.modal-body{padding:24px;}
.modal-foot{
  padding:16px 24px;border-top:1px solid var(--edge);
  display:flex;justify-content:flex-end;gap:10px;
  position:sticky;bottom:0;background:var(--surface);
}

/* ═══════════ FORM ELEMENTS ═══════════ */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
.form-row.single{grid-template-columns:1fr;}
.form-row.triple{grid-template-columns:1fr 1fr 1fr;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{
  font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);
}
.form-group input,
.form-group select,
.form-group textarea{
  background:var(--ink-2);border:1px solid var(--edge-strong);border-radius:var(--r-sm);
  padding:10px 13px;color:var(--text-primary);font-size:13.5px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;width:100%;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{
  border-color:var(--gold);
  box-shadow:0 0 0 3px rgba(201,136,42,0.12);
}
.form-group select option{background:var(--surface);}
.form-group textarea{resize:vertical;min-height:80px;}
.form-check{display:flex;align-items:center;gap:9px;cursor:pointer;}
.form-check input[type=checkbox]{
  width:16px;height:16px;accent-color:var(--gold);cursor:pointer;
}
.form-check span{font-size:13px;color:var(--text-muted);}
.form-divider{height:1px;background:var(--edge);margin:20px 0;}
.form-hint{font-size:11.5px;color:var(--text-faint);margin-top:3px;}

/* ═══════════ TOGGLE ═══════════ */
.toggle-wrap{display:flex;align-items:center;gap:10px;}
.toggle{
  position:relative;width:42px;height:24px;
  background:var(--surface-3);border:1px solid var(--edge-strong);
  border-radius:100px;cursor:pointer;transition:all 0.2s;
}
.toggle::after{
  content:'';position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:50%;background:var(--text-faint);
  transition:transform 0.2s,background 0.2s;
}
.toggle.on{background:var(--green);border-color:var(--green);}
.toggle.on::after{transform:translateX(18px);background:#fff;}
.toggle-label{font-size:13px;color:var(--text-muted);}

/* ═══════════ HOURS TABLE ═══════════ */
.hours-grid{display:flex;flex-direction:column;gap:0;}
.hours-row{
  display:grid;grid-template-columns:110px 1fr 1fr 80px 80px;
  align-items:center;gap:16px;padding:12px 0;
  border-bottom:1px solid rgba(210,155,60,0.06);
}
.hours-row:last-child{border-bottom:none;}
.hours-day{font-weight:600;color:var(--text-primary);font-size:13.5px;}
.hours-time input{
  width:100%;background:var(--ink-2);border:1px solid var(--edge-strong);
  border-radius:var(--r-sm);padding:8px 10px;color:var(--text-primary);font-size:13px;outline:none;
}
.hours-time input:focus{border-color:var(--gold);}
.hours-closed-label{font-size:12px;color:var(--text-faint);}

/* ═══════════ TOAST ═══════════ */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{
  padding:12px 18px;border-radius:var(--r-md);
  font-size:13.5px;font-weight:500;
  display:flex;align-items:center;gap:10px;
  transform:translateX(120%);transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
  box-shadow:0 8px 24px rgba(0,0,0,0.5);min-width:220px;
}
.toast.show{transform:none;}
.toast.success{background:#1a2e1a;border:1px solid var(--green-border);color:#7ec882;}
.toast.error{background:#2a1212;border:1px solid var(--red-border);color:#f08080;}
.toast.info{background:var(--surface-3);border:1px solid var(--edge-strong);color:var(--text-primary);}

/* ═══════════ EMPTY STATE ═══════════ */
.empty-state{
  text-align:center;padding:56px 24px;
}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:0.5;}
.empty-title{font-size:16px;font-weight:600;color:var(--text-muted);margin-bottom:6px;}
.empty-desc{font-size:13px;color:var(--text-faint);}

/* ═══════════ SEARCH BAR ═══════════ */
.search-wrap{position:relative;flex:1;max-width:280px;}
.search-wrap input{
  width:100%;background:var(--ink-2);border:1px solid var(--edge-strong);
  border-radius:var(--r-sm);padding:8px 12px 8px 34px;
  color:var(--text-primary);font-size:13px;outline:none;transition:border-color 0.2s;
}
.search-wrap input:focus{border-color:var(--gold);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;fill:var(--text-faint);}

/* ═══════════ HOLIDAY TAGS ═══════════ */
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;}
.tag{
  display:inline-flex;align-items:center;gap:6px;
  padding:5px 12px;border-radius:100px;
  background:var(--surface-3);border:1px solid var(--edge-strong);
  font-size:12px;color:var(--text-muted);
}
.tag-remove{
  background:none;border:none;color:var(--text-faint);
  font-size:14px;line-height:1;cursor:pointer;padding:0;
  transition:color 0.15s;
}
.tag-remove:hover{color:#f08080;}

/* ═══════════ CATEGORY CHIPS ═══════════ */
.cat-list{display:flex;flex-wrap:wrap;gap:10px;}
.cat-chip{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px;border-radius:var(--r-sm);
  background:var(--surface-2);border:1px solid var(--edge-strong);
  font-size:13px;font-weight:500;color:var(--text-primary);
}
.cat-chip-label{flex:1;}
.cat-count{font-size:11px;color:var(--text-muted);background:var(--surface-3);
  padding:2px 8px;border-radius:100px;}

/* ═══════════ RESPONSIVE ═══════════ */
.mobile-toggle{display:none;position:fixed;top:14px;left:14px;z-index:200;
  width:36px;height:36px;border-radius:var(--r-sm);
  background:var(--surface);border:1px solid var(--edge-strong);
  align-items:center;justify-content:center;cursor:pointer;
}
.mobile-toggle svg{width:18px;height:18px;fill:var(--text-primary);}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:none;}
  .main-area{margin-left:0;}
  .mobile-toggle{display:flex;}
  .form-row{grid-template-columns:1fr;}
  .form-row.triple{grid-template-columns:1fr;}
  .hours-grid{overflow-x:auto;}
  .hours-row{min-width:500px;}
  .topbar{padding:0 16px 0 58px;}
  .page-content{padding:16px;}
  .stats-row{grid-template-columns:1fr 1fr;}
}
@media(max-width:420px){.stats-row{grid-template-columns:1fr;}}

/* Overlay for mobile sidebar close */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:99;}
.sidebar-overlay.show{display:block;}

/* Scroll-bar styling */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--ink);}
::-webkit-scrollbar-thumb{background:var(--edge-strong);border-radius:3px;}
</style>
</head>
<body>

<!-- ════════════ LOGIN SCREEN ════════════ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo-ring">🍜</div>
    <div class="login-title">Admin Portal</div>
    <div class="login-sub">The Rangoon Kitchen</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="login-user" placeholder="admin" autocomplete="username"/>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="login-btn" onclick="doLogin()">Sign In to Dashboard</button>
    <div class="login-error" id="login-error">Incorrect username or password.</div>
  </div>
</div>

<!-- ════════════ MAIN APP ════════════ -->
<div id="app">
  <!-- Mobile sidebar toggle -->
  <button class="mobile-toggle" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24"><path d="M3 6h18v2H3zm0 5h18v2H3zm0 5h18v2H3z"/></svg>
  </button>
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon">🍜</div>
      <div class="sidebar-brand-text">
        <div class="sidebar-brand-name">Rangoon Kitchen</div>
        <div class="sidebar-brand-role">Admin Panel</div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Overview</div>
      <div class="nav-item active" onclick="showPage('dashboard',this)">
        <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3zm10 0h8v8h-8zM3 13h8v8H3zm10 4h2v-2h2v2h2v2h-2v2h-2v-2h-2z"/></svg>
        Dashboard
      </div>
      <div class="nav-section-label">Content</div>
      <div class="nav-item" onclick="showPage('menu',this)">
        <svg viewBox="0 0 24 24"><path d="M8.1 13.34l2.83-2.83L3.91 3.5c-1.56 1.56-1.56 4.09 0 5.66l4.19 4.18zm6.78-1.81c1.53.71 3.68.21 5.27-1.38 1.91-1.91 2.28-4.65.81-6.12-1.46-1.46-4.2-1.1-6.12.81-1.59 1.59-2.09 3.74-1.38 5.27L3.7 19.87l1.41 1.41L12 14.41l6.88 6.88 1.41-1.41L13.41 13l1.47-1.47z"/></svg>
        Menu Items
      </div>
      <div class="nav-item" onclick="showPage('categories',this)">
        <svg viewBox="0 0 24 24"><path d="M12 2l-5.5 9h11zm0 3.84L14.6 9h-5.2zM17.5 13c-2.49 0-4.5 2.01-4.5 4.5S15.01 22 17.5 22s4.5-2.01 4.5-4.5-2.01-4.5-4.5-4.5zm0 7c-1.38 0-2.5-1.12-2.5-2.5S16.12 15 17.5 15s2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5zM3 21.5h8v-8H3v8zm2-6h4v4H5v-4z"/></svg>
        Categories
      </div>
      <div class="nav-section-label">Operations</div>
      <div class="nav-item" onclick="showPage('hours',this)">
        <svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zm.01 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>
        Opening Hours
      </div>
      <div class="nav-item" onclick="showPage('holidays',this)">
        <svg viewBox="0 0 24 24"><path d="M17 12h-5v5h5v-5zM16 1v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2h-1V1h-2zm3 18H5V8h14v11z"/></svg>
        Holidays & Closures
      </div>
      <div class="nav-section-label">Settings</div>
      <div class="nav-item" onclick="showPage('settings',this)">
        <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        Site Settings
      </div>
    </nav>
    <div class="sidebar-footer">
      <span class="sidebar-footer-name">👤 Admin</span>
      <button class="logout-btn" onclick="doLogout()">Log Out</button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="main-area">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Dashboard</div>
      <div class="topbar-badge">● Live</div>
    </div>
    <div class="page-content" id="page-content">
      <!-- Pages injected here -->
    </div>
  </div>
</div>

<!-- ════════════ MODAL ════════════ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Modal</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<!-- ════════════ TOAST ════════════ -->
<div id="toast-container"></div>

<script>
/* ──────────────────────────────────────
   AUTH
────────────────────────────────────── */
async function doLogin() {
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const btn = document.querySelector('.login-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;
  try {
    const res = await fetch('/api/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    if (res.ok) {
      await loadData();
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').classList.add('visible');
      showPage('dashboard', document.querySelector('.nav-item.active'));
    } else {
      document.getElementById('login-error').classList.add('show');
    }
  } catch(e) {
    toast('Network error. Check connection.', 'error');
  }
  btn.textContent = 'Sign In to Dashboard'; btn.disabled = false;
}
document.getElementById('login-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
document.getElementById('login-user').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('login-pass').focus(); });

async function doLogout() {
  try { await fetch('/api/logout', { method:'POST' }); } catch(e) {}
  document.getElementById('app').classList.remove('visible');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
}

/* ──────────────────────────────────────
   SIDEBAR MOBILE
────────────────────────────────────── */
function toggleSidebar(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

/* ──────────────────────────────────────
   DATA STORE (API-backed)
────────────────────────────────────── */
let DB = {
  menu: [], categories: [], holidays: [],
  hours: { monday:{open:'08:00',close:'20:00',closed:false}, tuesday:{open:'08:00',close:'20:00',closed:false}, wednesday:{open:'08:00',close:'20:00',closed:false}, thursday:{open:'08:00',close:'20:00',closed:false}, friday:{open:'08:00',close:'20:00',closed:false}, saturday:{open:'09:00',close:'21:00',closed:false}, sunday:{open:'09:00',close:'18:00',closed:false} },
  settings: { siteName:'The Rangoon Kitchen', messengerUrl:'', phoneNumber:'', deliveryZone:'Thaketa Township', deliveryTime:'45–60 Min', isOpen:true }
};

async function api(path, method='GET', body=null) {
  const opts = { method, headers:{'Content-Type':'application/json'} };
  if (body !== null) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) throw new Error(`API ${method} ${path} → ${res.status}`);
  return res.json();
}

async function loadData() {
  try {
    const [menu, categories, hoursArr, holidays, settings] = await Promise.all([
      api('/api/admin/menu'),
      api('/api/categories'),
      api('/api/admin/hours'),
      api('/api/admin/holidays'),
      api('/api/admin/settings'),
    ]);
    DB.menu = menu.map(r => ({
      id: r.id, nameEn: r.name_en, nameMy: r.name_my,
      description: r.description, price: r.price,
      originalPrice: r.original_price || null,
      category: r.category, imageUrl: r.image_url,
      popular: !!r.is_popular, isSpecial: !!r.is_special, active: !!r.is_active,
    }));
    DB.categories = categories;
    hoursArr.forEach(h => {
      DB.hours[h.day_name] = { open: h.open_time, close: h.close_time, closed: !!h.is_closed };
    });
    DB.holidays = holidays.map(h => h.reason ? `${h.date}|${h.reason}` : h.date);
    // Store ids alongside for delete operations
    DB._holidayIds = {};
    holidays.forEach(h => { DB._holidayIds[h.date] = h.id; });
    DB.settings = {
      siteName:     settings.siteName    || 'The Rangoon Kitchen',
      messengerUrl: settings.messengerUrl || '',
      phoneNumber:  settings.phoneNumber  || '',
      deliveryZone: settings.deliveryZone || 'Thaketa Township',
      deliveryTime: settings.deliveryTime || '45–60 Min',
      isOpen:       settings.is_open === 'true',
    };
  } catch(e) {
    console.error('loadData failed:', e);
    toast('Failed to load data from server.', 'error');
  }
}

/* ──────────────────────────────────────
   TOAST
────────────────────────────────────── */
function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span>${msg}`;
  c.appendChild(t);
  setTimeout(()=>t.classList.add('show'), 10);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),350);}, 3000);
}

/* ──────────────────────────────────────
   MODAL
────────────────────────────────────── */
function openModal(title, bodyHtml, footHtml='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHtml;
  document.getElementById('modal-foot').innerHTML = footHtml;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('modal-overlay')) closeModal();
});

/* ──────────────────────────────────────
   PAGE ROUTING
────────────────────────────────────── */
const PAGE_TITLES = {
  dashboard:'Dashboard', menu:'Menu Items', categories:'Categories',
  hours:'Opening Hours', holidays:'Holidays & Closures', settings:'Site Settings'
};
function showPage(page, el) {
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('topbar-title').textContent = PAGE_TITLES[page] || page;
  const content = document.getElementById('page-content');
  content.innerHTML = '';
  closeSidebar();
  const renderers = { dashboard:renderDashboard, menu:renderMenu, categories:renderCategories, hours:renderHours, holidays:renderHolidays, settings:renderSettings };
  if(renderers[page]) renderers[page](content);
}

/* ──────────────────────────────────────
   DASHBOARD PAGE
────────────────────────────────────── */
function renderDashboard(wrap) {
  const specials = DB.menu.filter(m=>m.isSpecial).length;
  const popular = DB.menu.filter(m=>m.popular).length;
  const inactive = DB.menu.filter(m=>!m.active).length;
  const today = new Date().toLocaleDateString('en-CA');
  const isHoliday = DB.holidays.includes(today);
  const dayName = ['sunday','monday','tuesday','wednesday','thursday','friday','saturday'][new Date().getDay()];
  const todayHours = DB.hours[dayName];
  const statusTxt = isHoliday ? '⛔ Closed (Holiday)' : todayHours.closed ? '⛔ Closed Today' : `✅ Open ${todayHours.open} – ${todayHours.close}`;

  wrap.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Welcome back, Admin 👋</div><div class="page-desc">Here's what's happening at The Rangoon Kitchen today.</div></div>
    </div>
    <div class="stats-row">
      <div class="stat-card gold"><div class="stat-icon">🍜</div><div class="stat-val">${DB.menu.length}</div><div class="stat-label">Total Menu Items</div></div>
      <div class="stat-card green"><div class="stat-icon">✨</div><div class="stat-val">${specials}</div><div class="stat-label">Today's Specials</div></div>
      <div class="stat-card blue"><div class="stat-icon">⭐</div><div class="stat-val">${popular}</div><div class="stat-label">Popular Items</div></div>
      <div class="stat-card red"><div class="stat-icon">📂</div><div class="stat-val">${DB.categories.length}</div><div class="stat-label">Categories</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><div><div class="panel-title">Today's Status</div><div class="panel-sub">${new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div></div></div>
      <div class="panel-body">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;">
          <div style="font-size:28px;">${isHoliday||todayHours.closed?'🔴':'🟢'}</div>
          <div>
            <div style="font-size:16px;font-weight:600;color:var(--text-primary);">${statusTxt}</div>
            ${isHoliday?'<div style="font-size:12px;color:var(--text-faint);">Marked as holiday/closure</div>':''}
          </div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="btn btn-gold" onclick="showPage('menu',document.querySelectorAll('.nav-item')[1])">
            <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Add Menu Item
          </button>
          <button class="btn btn-outline" onclick="showPage('hours',document.querySelectorAll('.nav-item')[4])">Manage Hours</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Recent Menu Items</div></div>
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th>Item</th><th>Category</th><th>Price</th><th>Status</th></tr></thead>
          <tbody>
            ${DB.menu.slice(-5).reverse().map(item=>`
              <tr>
                <td>
                  <div style="display:flex;align-items:center;gap:12px;">
                    <img class="table-img" src="${item.imageUrl}" alt="${item.nameEn}" onerror="this.src='https://via.placeholder.com/48x40/1a1209/c9882a?text=RK'"/>
                    <div><div class="item-name">${item.nameEn}</div><div class="item-name-my">${item.nameMy}</div></div>
                  </div>
                </td>
                <td><span class="pill pill-muted">${item.category}</span></td>
                <td><div class="price-badge">${item.price.toLocaleString()} ကျပ်</div></td>
                <td>${item.isSpecial?'<span class="pill pill-gold">✨ Special</span>':item.popular?'<span class="pill pill-blue">⭐ Popular</span>':'<span class="pill pill-muted">Regular</span>'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

/* ──────────────────────────────────────
   MENU PAGE
────────────────────────────────────── */
let menuSearch = '';
function renderMenu(wrap) {
  const filtered = DB.menu.filter(m =>
    !menuSearch || m.nameEn.toLowerCase().includes(menuSearch.toLowerCase()) || m.nameMy.includes(menuSearch)
  );

  wrap.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Menu Items</div><div class="page-desc">${DB.menu.length} items across ${DB.categories.length} categories</div></div>
      <button class="btn btn-gold" onclick="openAddMenuModal()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Add New Item
      </button>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">All Items</div>
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          <input type="text" placeholder="Search items…" value="${menuSearch}" oninput="menuSearch=this.value;renderMenu(document.getElementById('page-content'))" />
        </div>
      </div>
      ${filtered.length === 0 ? `<div class="empty-state"><div class="empty-icon">🍽️</div><div class="empty-title">No items found</div><div class="empty-desc">Try a different search, or add a new menu item.</div></div>` : `
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead><tr><th></th><th>Name</th><th>Category</th><th>Price</th><th>Tags</th><th>Active</th><th>Actions</th></tr></thead>
          <tbody>
            ${filtered.map(item => `
              <tr>
                <td style="width:60px;"><img class="table-img" src="${item.imageUrl}" alt="${item.nameEn}" onerror="this.src='https://via.placeholder.com/48x40/1a1209/c9882a?text=RK'"/></td>
                <td><div class="item-name">${item.nameEn}</div><div class="item-name-my">${item.nameMy}</div></td>
                <td><span class="pill pill-muted">${item.category}</span></td>
                <td>
                  <div class="price-badge">${item.price.toLocaleString()} ကျပ်</div>
                  ${item.originalPrice?`<div style="font-size:11px;color:var(--text-faint);text-decoration:line-through;">${item.originalPrice.toLocaleString()} ကျပ်</div>`:''}
                </td>
                <td style="white-space:nowrap;">
                  ${item.isSpecial?'<span class="pill pill-gold" style="margin-right:4px;">✨ Special</span>':''}
                  ${item.popular?'<span class="pill pill-blue">⭐ Popular</span>':''}
                  ${!item.isSpecial&&!item.popular?'<span style="color:var(--text-faint);font-size:12px;">—</span>':''}
                </td>
                <td>
                  <div class="toggle ${item.active?'on':''}" onclick="toggleItemActive('${item.id}',this)"></div>
                </td>
                <td>
                  <div class="table-actions">
                    <button class="btn btn-outline btn-sm btn-icon" onclick="openEditMenuModal('${item.id}')" title="Edit">
                      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </button>
                    <button class="btn btn-danger btn-sm btn-icon" onclick="deleteMenuItem('${item.id}')" title="Delete">
                      <svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:currentColor;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                    </button>
                  </div>
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>`}
    </div>
  `;
}

function menuFormHtml(item={}) {
  const cats = DB.categories.map(c=>`<option value="${c}" ${item.category===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('');
  return `
    <div class="form-row">
      <div class="form-group"><label>English Name *</label><input type="text" id="f-nameEn" value="${item.nameEn||''}" placeholder="e.g. Mohinga"/></div>
      <div class="form-group"><label>Myanmar Name *</label><input type="text" id="f-nameMy" value="${item.nameMy||''}" placeholder="e.g. မုန့်ဟင်းခါး"/></div>
    </div>
    <div class="form-row single">
      <div class="form-group"><label>Description</label><textarea id="f-desc" placeholder="Describe the dish…">${item.description||''}</textarea></div>
    </div>
    <div class="form-row triple">
      <div class="form-group"><label>Price (MMK) *</label><input type="number" id="f-price" value="${item.price||''}" placeholder="2500"/></div>
      <div class="form-group"><label>Original Price (MMK)</label><input type="number" id="f-origPrice" value="${item.originalPrice||''}" placeholder="Optional (for strikethrough)"/></div>
      <div class="form-group"><label>Category *</label><select id="f-cat">${cats}</select></div>
    </div>
   <div class="form-row single">
  <div class="form-group">
    <label>Image</label>
    <input type="url" id="f-img" value="${item.imageUrl||''}" placeholder="https://… (paste image URL)" oninput="updateImgPreview(this.value)"/>
    <div style="text-align:center;font-size:11px;color:var(--text-faint);margin:6px 0;">— OR —</div>
    <label style="display:flex;align-items:center;justify-content:center;gap:8px;padding:10px;border:1px dashed var(--edge-strong);border-radius:var(--r-sm);cursor:pointer;color:var(--text-muted);font-size:13px;">
      📁 Upload from device
      <input type="file" id="f-img-file" accept="image/*" style="display:none;" onchange="handleImageUpload(this)"/>
    </label>
  </div>
</div>
    <div id="img-preview-wrap" style="margin-bottom:16px;display:${item.imageUrl?'block':'none'}">
      <img id="img-preview" src="${item.imageUrl||''}" style="height:120px;width:100%;object-fit:cover;border-radius:var(--r-md);border:1px solid var(--edge-strong);" onerror="this.style.display='none'"/>
    </div>
    <div class="form-divider"></div>
    <div style="display:flex;gap:20px;flex-wrap:wrap;">
      <label class="form-check"><input type="checkbox" id="f-popular" ${item.popular?'checked':''}/><span>⭐ Mark as Popular</span></label>
      <label class="form-check"><input type="checkbox" id="f-special" ${item.isSpecial?'checked':''}/><span>✨ Today's Special</span></label>
      <label class="form-check"><input type="checkbox" id="f-active" ${item.active!==false?'checked':''}/><span>✅ Active (visible on site)</span></label>
    </div>
  `;
}
function handleImageUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) {
    toast('Image must be under 2MB. Please resize it first.', 'error');
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('f-img').value = e.target.result;
    updateImgPreview(e.target.result);
    toast('Image uploaded!', 'success');
  };
  reader.readAsDataURL(file);
}
function updateImgPreview(url) {
  const w = document.getElementById('img-preview-wrap');
  const img = document.getElementById('img-preview');
  if(url){w.style.display='block';img.style.display='block';img.src=url;}
  else{w.style.display='none';}
}

function readMenuForm(existingId) {
  const nameEn = document.getElementById('f-nameEn').value.trim();
  const nameMy = document.getElementById('f-nameMy').value.trim();
  const price = parseInt(document.getElementById('f-price').value);
  const origPrice = parseInt(document.getElementById('f-origPrice').value) || null;
  if(!nameEn||!nameMy||!price){ toast('English name, Myanmar name, and price are required.','error'); return null; }
  return {
    id: existingId || nameEn.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'') + '-' + Date.now(),
    nameEn, nameMy,
    description: document.getElementById('f-desc').value.trim(),
    price, originalPrice: origPrice,
    category: document.getElementById('f-cat').value,
    imageUrl: document.getElementById('f-img').value.trim(),
    popular: document.getElementById('f-popular').checked,
    isSpecial: document.getElementById('f-special').checked,
    active: document.getElementById('f-active').checked,
  };
}

function openAddMenuModal() {
  openModal('Add New Menu Item', menuFormHtml(),
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveNewMenuItem()">Save Item</button>`
  );
}
async function saveNewMenuItem() {
  const item = readMenuForm(null);
  if(!item) return;
  try {
    await api('/api/admin/menu', 'POST', item);
    await loadData();
    closeModal();
    toast('Menu item added successfully!');
    showPage('menu', null);
  } catch(e) { toast('Failed to save item.', 'error'); }
}

function openEditMenuModal(id) {
  const item = DB.menu.find(m=>m.id===id);
  if(!item) return;
  openModal('Edit Menu Item', menuFormHtml(item),
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveEditMenuItem('${id}')">Save Changes</button>`
  );
}
async function saveEditMenuItem(id) {
  const updated = readMenuForm(id);
  if(!updated) return;
  try {
    await api(`/api/admin/menu/${id}`, 'PUT', updated);
    await loadData();
    closeModal();
    toast('Menu item updated!');
    showPage('menu', null);
  } catch(e) { toast('Failed to update item.', 'error'); }
}

function deleteMenuItem(id) {
  const item = DB.menu.find(m=>m.id===id);
  if(!item) return;
  openModal('Delete Item',
    `<p style="color:var(--text-muted);font-size:14px;">Are you sure you want to delete <strong style="color:var(--text-primary);">${item.nameEn}</strong>? This cannot be undone.</p>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmDeleteMenuItem('${id}')">Yes, Delete</button>`
  );
}
async function confirmDeleteMenuItem(id) {
  try {
    await api(`/api/admin/menu/${id}`, 'DELETE');
    await loadData();
    closeModal();
    toast('Item deleted.','info');
    showPage('menu', null);
  } catch(e) { toast('Failed to delete item.', 'error'); }
}

async function toggleItemActive(id, el) {
  const item = DB.menu.find(m=>m.id===id);
  if(!item) return;
  const newActive = !item.active;
  el.classList.toggle('on', newActive);
  try {
    await api(`/api/admin/menu/${id}`, 'PUT', { ...item, active: newActive });
    item.active = newActive;
    toast(newActive ? 'Item is now visible on site.' : 'Item hidden from site.', newActive?'success':'info');
  } catch(e) {
    el.classList.toggle('on', item.active); // revert
    toast('Failed to update item.', 'error');
  }
}

function openAddCatModal() {
  openModal('Add Category',
    `<div class="form-group"><label>Category Name</label><input type="text" id="f-cat-name" placeholder="e.g. drinks" style="text-transform:lowercase;"/><div class="form-hint">Lowercase, single word or hyphenated (e.g. "side-dishes")</div></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveAddCategory()">Add</button>`
  );
}
async function saveAddCategory() {
  const name = document.getElementById('f-cat-name').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!name){ toast('Category name required.','error'); return; }
  if(DB.categories.includes(name)){ toast('Category already exists.','error'); return; }
  try {
    await api('/api/admin/categories', 'POST', { name });
    await loadData();
    closeModal();
    toast('Category added!');
    showPage('categories', null);
  } catch(e) { toast('Failed to add category.', 'error'); }
}

function openEditCatModal(old) {
  openModal('Rename Category',
    `<div class="form-group"><label>New Name</label><input type="text" id="f-cat-rename" value="${old}" /></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-gold" onclick="saveRenameCategory('${old}')">Save</button>`
  );
}
async function saveRenameCategory(old) {
  const newName = document.getElementById('f-cat-rename').value.trim().toLowerCase().replace(/\s+/g,'-');
  if(!newName){ toast('Name required.','error'); return; }
  try {
    // Add new, delete old, update all items in that category
    await api('/api/admin/categories', 'POST', { name: newName });
    await api(`/api/admin/categories/${encodeURIComponent(old)}`, 'DELETE');
    const affected = DB.menu.filter(m=>m.category===old);
    await Promise.all(affected.map(m => api(`/api/admin/menu/${m.id}`, 'PUT', { ...m, category: newName })));
    await loadData();
    closeModal();
    toast('Category renamed!');
    showPage('categories', null);
  } catch(e) { toast('Failed to rename category.', 'error'); }
}

function deleteCategory(cat) {
  const count = DB.menu.filter(m=>m.category===cat).length;
  openModal('Delete Category',
    `<p style="color:var(--text-muted);">Delete <strong style="color:var(--text-primary);">${cat}</strong>?${count>0?` <strong style="color:#f08080;">${count} menu item(s)</strong> will remain but lose their category.`:''} This cannot be undone.</p>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmDeleteCategory('${cat}')">Delete</button>`
  );
}
async function confirmDeleteCategory(cat) {
  try {
    await api(`/api/admin/categories/${encodeURIComponent(cat)}`, 'DELETE');
    await loadData();
    closeModal();
    toast('Category deleted.','info');
    showPage('categories', null);
  } catch(e) { toast('Failed to delete category.', 'error'); }
}

      <button class="btn btn-gold" onclick="saveHoursPage()">
        <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
        Save Hours
      </button>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Weekly Schedule</div><div class="panel-sub">Changes apply immediately to the frontend</div></div>

          <div class="hours-row" style="border-bottom:1px solid var(--edge-strong);padding-bottom:8px;margin-bottom:4px;">
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-faint);">Day</div>
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-faint);">Opens</div>
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-faint);">Closes</div>
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-faint);">Closed</div>
          </div>
          ${DAYS.map(day => {
            const h = DB.hours[day];
            return `
              <div class="hours-row" id="hours-row-${day}">
                <div class="hours-day">${day.charAt(0).toUpperCase()+day.slice(1)}</div>
                <div class="hours-time"><input type="time" id="h-open-${day}" value="${h.open}" ${h.closed?'disabled':''}/></div>
                <div class="hours-time"><input type="time" id="h-close-${day}" value="${h.close}" ${h.closed?'disabled':''}/></div>
                <div>
                  <label class="form-check">
                    <input type="checkbox" id="h-closed-${day}" ${h.closed?'checked':''} onchange="toggleDayClosed('${day}',this)"/>

function toggleDayClosed(day, cb) {
  document.getElementById(`h-open-${day}`).disabled = cb.checked;
  document.getElementById(`h-close-${day}`).disabled = cb.checked;
}
async function saveHoursPage() {
  const days = DAYS.map(day => ({
    day_name: day,
    open_time:  document.getElementById(`h-open-${day}`).value || '08:00',
    close_time: document.getElementById(`h-close-${day}`).value || '20:00',
    is_closed:  document.getElementById(`h-closed-${day}`).checked ? 1 : 0,
  }));
  try {
    await api('/api/admin/hours', 'PUT', days);
    await loadData();
    toast('Opening hours saved!');
  } catch(e) { toast('Failed to save hours.', 'error'); }
}

   HOLIDAYS PAGE
────────────────────────────────────── */
function renderHolidays(wrap) {
  wrap.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Holidays & Closures</div><div class="page-desc">Block specific dates when you will be closed</div></div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Add Closure Date</div></div>
      <div class="panel-body">
        <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;">
          <div class="form-group" style="flex:1;min-width:180px;">
            <label>Date</label>
            <input type="date" id="h-date" min="${new Date().toLocaleDateString('en-CA')}"/>
          </div>
          <div class="form-group" style="flex:2;min-width:200px;">
            <label>Reason (optional)</label>
            <input type="text" id="h-reason" placeholder="e.g. Myanmar New Year, Public Holiday"/>
          </div>
          <button class="btn btn-gold" style="flex-shrink:0;" onclick="addHoliday()">Add Date</button>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Scheduled Closures</div><div class="panel-sub">${DB.holidays.length} date(s) blocked</div></div>
      <div class="panel-body">
        ${DB.holidays.length === 0 ? `<div class="empty-state"><div class="empty-icon">📅</div><div class="empty-title">No closures scheduled</div><div class="empty-desc">Add dates above when the kitchen won't be accepting orders.</div></div>` : `
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${DB.holidays.map((entry, i) => {
            const [date, reason] = typeof entry === 'string' && entry.includes('|') ? entry.split('|') : [entry, ''];
            return `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface-2);border:1px solid var(--edge-strong);border-radius:var(--r-md);">
                <div style="display:flex;align-items:center;gap:12px;">
                  <div style="font-size:20px;">📅</div>
                  <div>
                    <div style="font-weight:600;color:var(--text-primary);">${new Date(date+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</div>
                    ${reason?`<div style="font-size:12px;color:var(--text-muted);">${reason}</div>`:''}
                  </div>
                </div>
                <button class="btn btn-danger btn-sm" onclick="removeHoliday(${i})">Remove</button>
              </div>
            `;
          }).join('')}
        </div>`}
      </div>
    </div>
  `;
}
async function addHoliday() {
  const date = document.getElementById('h-date').value;
  const reason = document.getElementById('h-reason').value.trim();
  if(!date){ toast('Please pick a date.','error'); return; }
  const dateOnly = date;
  const alreadyExists = DB.holidays.some(h => (typeof h==='string'&&h.includes('|')?h.split('|')[0]:h)===dateOnly);
  if(alreadyExists){ toast('Date already added.','error'); return; }
  try {
    await api('/api/admin/holidays', 'POST', { date, reason });
    await loadData();
    toast('Closure date added!');
    showPage('holidays', null);
  } catch(e) { toast('Failed to add holiday.', 'error'); }
}
async function removeHoliday(i) {
  const entry = DB.holidays[i];
  const date = typeof entry==='string'&&entry.includes('|') ? entry.split('|')[0] : entry;
  const hid = DB._holidayIds && DB._holidayIds[date];
  if (!hid) { toast('Cannot find holiday ID.', 'error'); return; }
  try {
    await api(`/api/admin/holidays/${hid}`, 'DELETE');
    await loadData();
    toast('Closure date removed.','info');
    showPage('holidays', null);
  } catch(e) { toast('Failed to remove holiday.', 'error'); }
}

/* ──────────────────────────────────────
   SETTINGS PAGE
────────────────────────────────────── */
function renderSettings(wrap) {
  const s = DB.settings;
  wrap.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Site Settings</div><div class="page-desc">Global configuration for the frontend</div></div>
      <button class="btn btn-gold" onclick="saveSettings()">
        <svg viewBox="0 0 24 24"><path d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
        Save Settings
      </button>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">General</div></div>
      <div class="panel-body">
        <div class="form-row">

        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Contact & Ordering</div></div>
      <div class="panel-body">
        <div class="form-row">
          <div class="form-group"><label>Facebook Messenger URL</label><input type="url" id="s-ms" value="${s.messengerUrl}" placeholder="https://m.me/YourPage"/></div>
          <div class="form-group"><label>Phone Number</label><input type="text" id="s-phone" value="${s.phoneNumber}" placeholder="+959XXXXXXXX"/></div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head">
        <div><div class="panel-title">Kitchen Status</div><div class="panel-sub">Manually override whether the kitchen is accepting orders</div></div>
      </div>
      <div class="panel-body">
        <div class="toggle-wrap">
          <div class="toggle ${s.isOpen?'on':''}" id="status-toggle" onclick="toggleKitchenStatus(this)"></div>
          <span class="toggle-label" id="status-label">${s.isOpen?'Kitchen is Open — accepting orders':'Kitchen is Closed'}</span>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Admin Password</div><div class="panel-sub">Change your login password</div></div>
      <div class="panel-body">
        <div class="form-row">
          <div class="form-group"><label>New Password</label><input type="password" id="s-newpass" placeholder="Leave blank to keep current"/></div>
          <div class="form-group"><label>Confirm Password</label><input type="password" id="s-confpass" placeholder="Re-enter new password"/></div>
        </div>
        <button class="btn btn-outline" onclick="changePassword()">Update Password</button>
      </div>
    </div>
    <div class="panel">
      <div class="panel-head"><div class="panel-title" style="color:#f08080;">Danger Zone</div></div>
      <div class="panel-body">
        <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">Reset all data to factory defaults. This will erase all menu items, custom categories, hours, and holidays.</p>
        <button class="btn btn-danger" onclick="resetAllData()">Reset to Defaults</button>
      </div>
    </div>
  `;
}
async function toggleKitchenStatus(el) {
  el.classList.toggle('on');
  const isOpen = el.classList.contains('on');
  document.getElementById('status-label').textContent = isOpen ? 'Kitchen is Open — accepting orders' : 'Kitchen is Closed';
  try {
    await api('/api/admin/settings', 'PUT', { is_open: isOpen ? 'true' : 'false' });
    DB.settings.isOpen = isOpen;
    toast(isOpen ? 'Kitchen is now open!' : 'Kitchen is now closed.', isOpen?'success':'info');
  } catch(e) {
    el.classList.toggle('on'); // revert
    document.getElementById('status-label').textContent = DB.settings.isOpen ? 'Kitchen is Open — accepting orders' : 'Kitchen is Closed';
    toast('Failed to update status.', 'error');
  }
}
async function saveSettings() {
  const updates = {
    siteName:     document.getElementById('s-name').value.trim(),
    deliveryZone: document.getElementById('s-zone').value.trim(),
    deliveryTime: document.getElementById('s-dtime').value.trim(),
    messengerUrl: document.getElementById('s-ms').value.trim(),
    phoneNumber:  document.getElementById('s-phone').value.trim(),
  };
  try {
    await api('/api/admin/settings', 'PUT', updates);
    Object.assign(DB.settings, updates);
    toast('Settings saved!');
  } catch(e) { toast('Failed to save settings.', 'error'); }
}
async function changePassword() {
  const np = document.getElementById('s-newpass').value;
  const cp = document.getElementById('s-confpass').value;
  if(!np){ toast('Enter a new password.','error'); return; }
  if(np!==cp){ toast('Passwords do not match.','error'); return; }
  try {
    await api('/api/admin/password', 'POST', { password: np });
    document.getElementById('s-newpass').value='';
    document.getElementById('s-confpass').value='';
    toast('Password updated!');
  } catch(e) { toast('Failed to update password. Make sure the endpoint exists.', 'error'); }
}
function resetAllData() {
  openModal('Reset All Data',
    `<p style="color:var(--text-muted);">This will <strong style="color:#f08080;">permanently erase</strong> all your menu items, categories, hours, and settings and restore defaults. Are you absolutely sure?</p>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-danger" onclick="confirmReset()">Yes, Reset Everything</button>`
  );
}
function confirmReset() {
  closeModal();
  toast('Reset is not available — data lives in the database. Delete items manually.', 'info');
}
